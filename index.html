<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐈</text></svg>">
  <title>Dzień Kobiet</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ffd6eb 0%, #ffc2df 35%, #ffb3d7 65%, #ff9fcb 100%);
      position: relative;
    }

    .hearts {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      color: rgba(255, 255, 255, 0.78);
      animation: floatUp linear infinite;
      user-select: none;
    }

    .heart:nth-child(1)  { left: 3%;  animation-duration: 7s;   animation-delay: 0s;   font-size: 18px; }
    .heart:nth-child(2)  { left: 8%;  animation-duration: 9s;   animation-delay: 1s;   font-size: 26px; }
    .heart:nth-child(3)  { left: 14%; animation-duration: 8s;   animation-delay: 2s;   font-size: 20px; }
    .heart:nth-child(4)  { left: 20%; animation-duration: 10s;  animation-delay: 0.5s; font-size: 16px; }
    .heart:nth-child(5)  { left: 27%; animation-duration: 7.5s; animation-delay: 1.3s; font-size: 24px; }
    .heart:nth-child(6)  { left: 34%; animation-duration: 11s;  animation-delay: 2.3s; font-size: 17px; }
    .heart:nth-child(7)  { left: 40%; animation-duration: 8.5s; animation-delay: 0.8s; font-size: 22px; }
    .heart:nth-child(8)  { left: 46%; animation-duration: 9.5s; animation-delay: 2.6s; font-size: 15px; }
    .heart:nth-child(9)  { left: 52%; animation-duration: 7.8s; animation-delay: 1.6s; font-size: 23px; }
    .heart:nth-child(10) { left: 58%; animation-duration: 10.8s; animation-delay: 0.4s; font-size: 18px; }
    .heart:nth-child(11) { left: 64%; animation-duration: 8.2s; animation-delay: 2.1s; font-size: 27px; }
    .heart:nth-child(12) { left: 70%; animation-duration: 9.8s; animation-delay: 1.1s; font-size: 16px; }
    .heart:nth-child(13) { left: 76%; animation-duration: 7.4s; animation-delay: 2.8s; font-size: 24px; }
    .heart:nth-child(14) { left: 82%; animation-duration: 11.5s; animation-delay: 0.9s; font-size: 19px; }
    .heart:nth-child(15) { left: 88%; animation-duration: 8.7s; animation-delay: 1.8s; font-size: 25px; }
    .heart:nth-child(16) { left: 94%; animation-duration: 10.2s; animation-delay: 0.2s; font-size: 17px; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(1.3) rotate(18deg);
        opacity: 0;
      }
    }

    .scene {
      position: relative;
      width: 980px;
      height: 660px;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .envelope-zone {
      top: 55px;
      position: relative;
      width: 560px;
      height: 520px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      z-index: 3;
    }

    .envelope-wrapper {
      position: relative;
      width: 560px;
      height: 390px;
      cursor: pointer;
      transition: transform 0.35s ease;
      filter: drop-shadow(0 24px 40px rgba(255, 76, 145, 0.24));
      z-index: 3;
    }

    .envelope-wrapper:hover {
      transform: scale(1.02);
    }

    .letter {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(0);
      width: 455px;
      height: 300px;
      background: linear-gradient(180deg, #fff9fc, #ffeef7);
      border-radius: 24px;
      padding: 34px 28px 26px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(255, 96, 155, 0.16);
      transition:
        transform 0.9s ease,
        opacity 0.75s ease,
        box-shadow 0.75s ease;
      z-index: 2;
      opacity: 0.98;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      overflow: visible;
    }

    .letter h1 {
      color: #ff4e99;
      font-size: 2.4rem;
      line-height: 1.14;
      max-width: 100%;
      opacity: 0;
      transition: opacity 0.45s ease;
      word-break: break-word;
    }

    .letter p {
      color: #c7548a;
      font-size: 1.08rem;
      line-height: 1.35;
      max-width: 90%;
      opacity: 0;
      transition: opacity 0.35s ease;
      word-break: break-word;
    }

    .cat {
      position: absolute;
      left: 50%;
      top: -108px;
      width: 150px;
      height: 130px;
      transform: translateX(-50%) translateY(95px);
      transition: transform 0.9s ease;
      z-index: 1;
      pointer-events: none;
    }

    .cat-head {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      width: 102px;
      height: 84px;
      background: #fff4f8;
      border-radius: 50%;
      box-shadow: inset 0 -4px 0 rgba(255, 182, 193, 0.35);
      z-index: 3;
    }

    .cat-ear {
      position: absolute;
      width: 30px;
      height: 34px;
      background: #fff4f8;
      top: -12px;
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
    }

    .cat-ear::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: #ffb7cf;
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
    }

    .cat-ear.left {
      left: 10px;
      transform: rotate(-12deg);
    }

    .cat-ear.right {
      right: 10px;
      transform: rotate(12deg);
    }

    .cat-eye {
      position: absolute;
      top: 34px;
      width: 8px;
      height: 10px;
      background: #5a4a54;
      border-radius: 50%;
    }

    .cat-eye.left {
      left: 28px;
    }

    .cat-eye.right {
      right: 28px;
    }

    .cat-nose {
      position: absolute;
      left: 50%;
      top: 46px;
      transform: translateX(-50%);
      width: 12px;
      height: 9px;
      background: #ff9fbb;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
    }

    .cat-mouth {
      position: absolute;
      left: 50%;
      top: 56px;
      width: 24px;
      height: 12px;
      transform: translateX(-50%);
    }

    .cat-mouth::before,
    .cat-mouth::after {
      content: "";
      position: absolute;
      top: 0;
      width: 12px;
      height: 10px;
      border-bottom: 2px solid #d87a97;
      border-radius: 0 0 12px 12px;
    }

    .cat-mouth::before {
      left: 0;
      transform: rotate(8deg);
    }

    .cat-mouth::after {
      right: 0;
      transform: rotate(-8deg);
    }

    .whisker {
      position: absolute;
      width: 30px;
      height: 2px;
      background: #d9a3b7;
      top: 50px;
      border-radius: 999px;
      transform-origin: center;
    }

    .whisker.w1 { left: -20px; transform: rotate(12deg); }
    .whisker.w2 { left: -20px; top: 58px; transform: rotate(-10deg); }
    .whisker.w3 { right: -20px; transform: rotate(-12deg); }
    .whisker.w4 { right: -20px; top: 58px; transform: rotate(10deg); }

    .cat-body {
      position: absolute;
      left: 50%;
      top: 84px;
      transform: translateX(-50%);
      width: 72px;
      height: 34px;
      background: #fff4f8;
      border-radius: 24px 24px 18px 18px;
      box-shadow: inset 0 -3px 0 rgba(255, 182, 193, 0.28);
      z-index: 2;
    }

    .cat-paw {
      position: absolute;
      top: 102px;
      width: 26px;
      height: 24px;
      background: #fff4f8;
      border-radius: 16px 16px 14px 14px;
      box-shadow: inset 0 -3px 0 rgba(255, 182, 193, 0.3);
      z-index: 2;
    }

    .cat-paw.left {
      left: 47px;
    }

    .cat-paw.right {
      right: 47px;
    }

    .cat-paw::before,
    .cat-paw::after {
      content: "";
      position: absolute;
      top: 5px;
      width: 5px;
      height: 5px;
      background: #ffb7cf;
      border-radius: 50%;
    }

    .cat-paw::before {
      left: 5px;
      box-shadow: 8px 0 0 #ffb7cf;
    }

    .cat-paw::after {
      left: 9px;
      top: 11px;
      width: 8px;
      height: 7px;
      border-radius: 50%;
    }

    .envelope-back {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ff8fc2, #ff71b3);
      border-radius: 0 0 24px 24px;
      z-index: 1;
      overflow: hidden;
    }

    .envelope-back::before,
    .envelope-back::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 50%;
      height: 100%;
      background: rgba(255, 255, 255, 0.16);
    }

    .envelope-back::before {
      left: 0;
      clip-path: polygon(0 0, 100% 100%, 0 100%);
    }

    .envelope-back::after {
      right: 0;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 210px;
      background: linear-gradient(135deg, #ff9bcc, #ff6faf);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 0.9s ease;
      z-index: 5;
      border-radius: 24px 24px 0 0;
      backface-visibility: hidden;
    }

    .envelope-front {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    .envelope-front::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 79%;
      background: linear-gradient(135deg, #ff7fba, #ff5fa8);
      clip-path: polygon(0 100%, 0 38%, 50% 100%, 100% 38%, 100% 100%);
      border-radius: 0 0 24px 24px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.15);
    }

    .seal {
      position: absolute;
      top: 126px;
      left: 50%;
      transform: translateX(-50%);
      width: 82px;
      height: 82px;
      background: #ff4f9e;
      border-radius: 50%;
      z-index: 6;
      box-shadow: 0 6px 14px rgba(255, 79, 158, 0.35);
      transition: opacity 0.35s ease;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .paw-seal {
      position: relative;
      width: 30px;
      height: 24px;
      background: #ffffff;
      border-radius: 55% 55% 50% 50%;
    }

    .paw-seal .pad {
      position: absolute;
      width: 9px;
      height: 11px;
      background: #ffffff;
      border-radius: 50%;
      top: -8px;
    }

    .paw-seal .pad.p1 { left: 1px; }
    .paw-seal .pad.p2 { left: 10.5px; top: -10px; }
    .paw-seal .pad.p3 { right: 1px; }

    .bouquet {
      position: absolute;
      top: 115px;
      width: 250px;
      height: 360px;
      z-index: 2;
      pointer-events: none;
      filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.12));
    }

    .bouquet.right {
      right: -10px;
      transform: rotate(8deg);
    }

    .bouquet.left {
      left: -10px;
      transform: scaleX(-1) rotate(8deg);
      transform-origin: center;
    }

    .bouquet-stem {
      position: absolute;
      width: 8px;
      background: linear-gradient(to bottom, #359c4c, #1d6e30);
      border-radius: 999px;
      z-index: 1;
    }

    .bouquet-stem.s1 { height: 122px; left: 98px; top: 114px; transform: rotate(-8deg); }
    .bouquet-stem.s2 { height: 116px; left: 118px; top: 112px; transform: rotate(2deg); }
    .bouquet-stem.s3 { height: 124px; left: 138px; top: 106px; transform: rotate(10deg); }
    .bouquet-stem.s4 { height: 110px; left: 82px; top: 126px; transform: rotate(-16deg); }
    .bouquet-stem.s5 { height: 110px; left: 154px; top: 124px; transform: rotate(18deg); }

    .bouquet-leaf {
      position: absolute;
      width: 38px;
      height: 20px;
      background: linear-gradient(135deg, #42ba58, #24863a);
      border-radius: 100% 0 100% 0;
      z-index: 1;
    }

    .bouquet-leaf.l1 { left: 92px; top: 176px; transform: rotate(-35deg); }
    .bouquet-leaf.l2 { left: 126px; top: 174px; transform: rotate(25deg); }
    .bouquet-leaf.l3 { left: 108px; top: 198px; transform: rotate(150deg); }
    .bouquet-leaf.l4 { left: 138px; top: 202px; transform: rotate(18deg); }

    .bouquet-wrap-back {
      position: absolute;
      bottom: 40px;
      left: 38px;
      width: 190px;
      height: 170px;
      background: linear-gradient(135deg, #ffcee4, #ff9fc8);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      z-index: 2;
      opacity: 0.95;
    }

    .bouquet-wrap-front-left {
      position: absolute;
      bottom: 42px;
      left: 44px;
      width: 110px;
      height: 155px;
      background: linear-gradient(135deg, #ffb7d6, #ff8fc2);
      clip-path: polygon(100% 100%, 0 16%, 0 0, 100% 72%);
      z-index: 5;
    }

    .bouquet-wrap-front-right {
      position: absolute;
      bottom: 42px;
      right: 20px;
      width: 110px;
      height: 155px;
      background: linear-gradient(135deg, #ffb7d6, #ff8fc2);
      clip-path: polygon(0 100%, 100% 16%, 100% 0, 0 72%);
      z-index: 5;
    }

    .bouquet-ribbon-center {
      position: absolute;
      left: 53%;
      bottom: 95px;
      transform: translateX(-50%);
      width: 34px;
      height: 26px;
      background: linear-gradient(135deg, #ff4f9e, #e23686);
      border-radius: 10px;
      z-index: 7;
    }

    .bouquet-ribbon-left,
    .bouquet-ribbon-right {
      position: absolute;
      bottom: 90px;
      width: 46px;
      height: 34px;
      background: linear-gradient(135deg, #ff73b2, #ff4f9e);
      z-index: 6;
    }

    .bouquet-ribbon-left {
      left: 98px;
      border-radius: 10px 24px 10px 24px;
      transform: rotate(-18deg);
    }

    .bouquet-ribbon-right {
      right: 76px;
      border-radius: 24px 10px 24px 10px;
      transform: rotate(18deg);
    }

    .bouquet-tail-left,
    .bouquet-tail-right {
      position: absolute;
      bottom: 58px;
      width: 14px;
      height: 46px;
      background: linear-gradient(180deg, #ff72b2, #e23686);
      z-index: 6;
      border-radius: 10px;
    }

    .bouquet-tail-left {
      left: 121px;
      transform: rotate(8deg);
    }

    .bouquet-tail-right {
      right: 101px;
      transform: rotate(-8deg);
    }

    .mini-rose,
    .lily {
      position: absolute;
      z-index: 4;
    }

    .mini-rose {
      width: 64px;
      height: 64px;
    }

    .mini-rose .core {
      position: absolute;
      width: 24px;
      height: 24px;
      left: 20px;
      top: 20px;
      background: #b30024;
      border-radius: 50%;
      z-index: 3;
    }

    .mini-rose .petal {
      position: absolute;
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #ff315a, #c4002b);
      border-radius: 60% 40% 60% 40%;
    }

    .mini-rose .p1 { top: 0; left: 15px; }
    .mini-rose .p2 { top: 15px; left: 30px; transform: rotate(90deg); }
    .mini-rose .p3 { top: 30px; left: 15px; transform: rotate(180deg); }
    .mini-rose .p4 { top: 15px; left: 0; transform: rotate(270deg); }

    .lily {
      width: 60px;
      height: 60px;
    }

    .lily .petal {
      position: absolute;
      width: 24px;
      height: 34px;
      background: linear-gradient(180deg, #ffd8ec, #ff9ec9);
      border-radius: 70% 70% 40% 40%;
      left: 18px;
      top: 12px;
      transform-origin: center bottom;
    }

    .lily .petal.lp1 { transform: rotate(0deg); }
    .lily .petal.lp2 { transform: rotate(60deg); }
    .lily .petal.lp3 { transform: rotate(120deg); }
    .lily .petal.lp4 { transform: rotate(180deg); }
    .lily .petal.lp5 { transform: rotate(240deg); }
    .lily .petal.lp6 { transform: rotate(300deg); }

    .lily .center {
      position: absolute;
      left: 26px;
      top: 24px;
      width: 8px;
      height: 8px;
      background: #ffcc4d;
      border-radius: 50%;
      z-index: 2;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
    }

    .lily .stamen {
      position: absolute;
      left: 29px;
      top: 15px;
      width: 2px;
      height: 16px;
      background: #b67d2f;
      transform-origin: bottom;
      z-index: 1;
    }

    .lily .s1 { transform: rotate(-18deg); }
    .lily .s2 { transform: rotate(0deg); }
    .lily .s3 { transform: rotate(18deg); }

    .r1 { left: 74px; top: 58px; transform: rotate(-8deg) scale(1.02); }
    .r2 { left: 116px; top: 34px; transform: rotate(5deg); }
    .r3 { left: 156px; top: 64px; transform: rotate(10deg) scale(0.95); }

    .l1 { left: 58px; top: 84px; transform: rotate(-18deg); }
    .l2 { left: 146px; top: 84px; transform: rotate(14deg); }
    .l3 { left: 106px; top: 84px; transform: rotate(6deg) scale(0.95); }

    .game-trigger {
      position: absolute;
      left: 50%;
      top: 420px;
      transform: translateX(-50%);
      padding: 14px 34px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff67ad, #ff3f95);
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(255, 79, 158, 0.28);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      z-index: 20;
    }

    .game-trigger:hover {
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 14px 28px rgba(255, 79, 158, 0.34);
    }

    .game-modal {
      position: fixed;
      inset: 0;
      background: rgba(255, 183, 214, 0.35);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      padding: 24px;
    }

    .game-modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .game-card {
      width: min(920px, 94vw);
      min-height: 620px;
      border-radius: 34px;
      background:
        radial-gradient(circle at top, #ffe7f3 0%, #ffd2e8 36%, #ffc0df 68%, #ffb2d8 100%);
      box-shadow: 0 26px 60px rgba(255, 76, 145, 0.22);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 24px 26px;
    }

    .game-card::before,
    .game-card::after {
      content: "❤";
      position: absolute;
      color: rgba(255, 100, 170, 0.12);
      font-size: 120px;
      pointer-events: none;
    }

    .game-card::before {
      top: 42px;
      left: 18px;
      transform: rotate(-12deg);
    }

    .game-card::after {
      right: 18px;
      bottom: 18px;
      transform: rotate(14deg);
    }

    .game-petals-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .game-petals-bg span {
      position: absolute;
      top: -60px;
      color: rgba(255, 255, 255, 0.58);
      font-size: 28px;
      animation: petalsFall linear infinite;
      user-select: none;
    }

    .game-petals-bg span:nth-child(1)  { left: 4%;  animation-duration: 9s;  animation-delay: 0s;   font-size: 18px; }
    .game-petals-bg span:nth-child(2)  { left: 10%; animation-duration: 11s; animation-delay: 1s;   font-size: 24px; }
    .game-petals-bg span:nth-child(3)  { left: 18%; animation-duration: 10s; animation-delay: 2s;   font-size: 22px; }
    .game-petals-bg span:nth-child(4)  { left: 26%; animation-duration: 12s; animation-delay: 0.5s; font-size: 20px; }
    .game-petals-bg span:nth-child(5)  { left: 34%; animation-duration: 9.5s;animation-delay: 1.4s; font-size: 26px; }
    .game-petals-bg span:nth-child(6)  { left: 42%; animation-duration: 11.5s;animation-delay: 2.3s; font-size: 18px; }
    .game-petals-bg span:nth-child(7)  { left: 50%; animation-duration: 10.2s;animation-delay: 0.9s; font-size: 24px; }
    .game-petals-bg span:nth-child(8)  { left: 58%; animation-duration: 12.2s;animation-delay: 2.6s; font-size: 16px; }
    .game-petals-bg span:nth-child(9)  { left: 66%; animation-duration: 9.8s;animation-delay: 1.2s; font-size: 23px; }
    .game-petals-bg span:nth-child(10) { left: 74%; animation-duration: 11.8s;animation-delay: 0.3s; font-size: 19px; }

    @keyframes petalsFall {

      top: 10px;

  <script>
    const envelope = document.getElementById("envelope");
    const openGameBtn = document.getElementById("openGameBtn");
    const closeGameBtn = document.getElementById("closeGameBtn");
    const resetGameBtn = document.getElementById("resetGameBtn");
    const gameModal = document.getElementById("gameModal");
    const statusMain = document.getElementById("statusMain");
    const roseBloom = document.getElementById("roseBloom");

    envelope.addEventListener("click", () => {
      envelope.classList.toggle("open");
    });

    openGameBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      gameModal.classList.add("show");
    });

    closeGameBtn.addEventListener("click", () => {
      gameModal.classList.remove("show");
    });

    gameModal.addEventListener("click", (e) => {
      if (e.target === gameModal) {
        gameModal.classList.remove("show");
      }
    });

    const TOTAL_PETALS = 15;
    let petalsLeft = TOTAL_PETALS;

    const petalLayout = [
      { angle: -62, distance: 82, layer: "back" },
      { angle: -38, distance: 88, layer: "back" },
      { angle: -16, distance: 92, layer: "mid" },
      { angle: 0,   distance: 94, layer: "mid" },
      { angle: 16,  distance: 92, layer: "mid" },
      { angle: 38,  distance: 88, layer: "back" },
      { angle: 62,  distance: 82, layer: "back" },

      { angle: -96,  distance: 74, layer: "front" },
      { angle: -122, distance: 64, layer: "front" },
      { angle: -146, distance: 56, layer: "front" },

      { angle: 96,  distance: 74, layer: "front" },
      { angle: 122, distance: 64, layer: "front" },
      { angle: 146, distance: 56, layer: "front" },

      { angle: -170, distance: 68, layer: "front" },
      { angle: 170,  distance: 52, layer: "front" }
    ];

    function bumpStatus() {
      statusMain.classList.remove("bump");
      void statusMain.offsetWidth;
      statusMain.classList.add("bump");
    }

    function currentText(beforeRemoval) {
      return beforeRemoval % 2 === 1 ? "Kocha" : "Nie kocha";
    }

    function createPetal(config, index) {
      const petal = document.createElement("button");
      petal.type = "button";
      petal.className = `game-petal ${config.layer}`;
      petal.dataset.index = index;
      petal.dataset.removed = "false";

      const shape = document.createElement("span");
      shape.className = "shape";
      petal.appendChild(shape);

      petal.style.transform = `rotate(${config.angle}deg) translateY(-${config.distance}px)`;

      const tx = `${(Math.random() * 160 - 80).toFixed(0)}px`;
      const ty = `${(120 + Math.random() * 60).toFixed(0)}px`;
      const rot = `${(Math.random() * 220 - 110).toFixed(0)}deg`;

      petal.style.setProperty("--tx", tx);
      petal.style.setProperty("--ty", ty);
      petal.style.setProperty("--rot", rot);

      petal.addEventListener("click", () => removePetal(petal));
      return petal;
    }

    function buildRoseGame() {
      roseBloom.querySelectorAll(".game-petal").forEach((p) => p.remove());

      const coreFront = roseBloom.querySelector(".rose-core-front");

      petalLayout.forEach((cfg, i) => {
        const petal = createPetal(cfg, i);
        roseBloom.insertBefore(petal, coreFront);
      });

      petalsLeft = TOTAL_PETALS;
      statusMain.textContent = "";
      statusMain.classList.remove("bump");
    }

    function removePetal(petal) {
      if (petal.dataset.removed === "true") return;

      statusMain.textContent = currentText(petalsLeft);
      bumpStatus();

      petal.dataset.removed = "true";
      petal.classList.add("fall");

      setTimeout(() => {
        petal.classList.add("removed");
      }, 780);

      petalsLeft--;
    }

    resetGameBtn.addEventListener("click", buildRoseGame);

    buildRoseGame();
  </script>
